<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - A7 Store</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --accent-color: #fff;
            --gray-color: #888;
            --border-color: #222;
            --input-bg: #151515;
        }

        [lang="en"] {
            font-family: 'Inter', sans-serif;
        }

        [lang="ar"] {
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .checkout-container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -1px;
        }

        h3 {
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #444;
            background: #1a1a1a;
        }

        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .payment-option {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.3s;
        }

        .payment-option:hover {
            border-color: #444;
        }

        .payment-option input {
            width: auto;
            margin: 0 12px;
        }

        .order-summary {
            background: #000;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            border: 1px dashed var(--border-color);
        }

        .summary-item {
            margin: 12px 0;
            font-size: 0.95rem;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        .summary-item strong {
            color: #fff;
        }

        .summary-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 1.3rem;
            color: #fff;
            display: flex;
            justify-content: space-between;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .complete-btn {
            width: 100%;
            padding: 20px;
            background: white;
            color: black;
            font-weight: 800;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 30px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .complete-btn:hover {
            background: #eee;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .complete-btn img {
            width: 24px;
            height: 24px;
        }

        @media (max-width: 480px) {
            .checkout-container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="checkout-container">
        <h2 data-i18n="checkout_title">الدفع والشحن</h2>
        
        <div class="section">
            <h3 data-i18n="shipping_info">بيانات الشحن</h3>
            <div class="input-group"><input type="text" id="custName" placeholder="الاسم بالكامل" data-i18n="[placeholder]form_name"></div>
            <div class="input-group"><input type="text" id="custPhone" placeholder="رقم الموبايل" data-i18n="[placeholder]form_phone"></div>
            <div class="input-group"><input type="text" id="custAddress" placeholder="العنوان بالتفصيل" data-i18n="[placeholder]form_address"></div>
        </div>

        <div class="section">
            <h3 data-i18n="payment_method">طريقة الدفع</h3>
            <div class="payment-options">
                <label class="payment-option">
                    <input type="radio" name="payment" value="Vodafone Cash" checked>
                    <span data-i18n="pay_vodafone">فودافون كاش (Vodafone Cash)</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment" value="Cash on Delivery">
                    <span data-i18n="pay_cod">دفع عند الاستلام (COD)</span>
                </label>
            </div>
        </div>

        <div class="order-summary">
            <h3 data-i18n="order_summary" style="margin-top:0;">ملخص الطلب</h3>
            <div class="summary-item"><strong data-i18n="item_label">المنتج:</strong> <span id="displayItem"></span></div>
            <div class="summary-item"><strong data-i18n="color_label">اللون:</strong> <span id="displayColor"></span></div>
            <div class="summary-item"><strong data-i18n="size_label">المقاس:</strong> <span id="displaySize"></span></div>
            <div class="summary-item"><strong data-i18n="qty_label">الكمية:</strong> <span id="displayQty"></span></div>
            <div class="summary-total"><strong data-i18n="total_label">الإجمالي:</strong> <span id="displayPrice"></span></div>
        </div>

        <button class="complete-btn" onclick="finishOrder()">
            <span data-i18n="complete_btn">إتمام الطلب عبر واتساب</span>
            <img src="https://img.icons8.com/color/48/whatsapp--v1.png" alt="WhatsApp">
        </button>
    </div>

    <script>
        const translations = {
            ar: {
                checkout_title: "الدفع والشحن",
                shipping_info: "بيانات الشحن",
                form_name: "الاسم بالكامل",
                form_phone: "رقم الموبايل",
                form_address: "العنوان بالتفصيل",
                payment_method: "طريقة الدفع",
                pay_vodafone: "فودافون كاش (Vodafone Cash)",
                pay_cod: "دفع عند الاستلام (COD)",
                order_summary: "ملخص الطلب",
                item_label: "المنتج",
                color_label: "اللون",
                size_label: "المقاس",
                qty_label: "الكمية",
                total_label: "الإجمالي",
                complete_btn: "إتمام الطلب عبر واتساب",
                alert_fill: "برجاء إكمال جميع البيانات المطلوبة!",
                wa_msg_header: "طلب جديد من A7",
                wa_msg_price: "سعر القطعة",
                wa_msg_payment: "طريقة الدفع",
                pay_method_vodafone: "فودافون كاش",
                pay_method_cod: "دفع عند الاستلام"
            },
            en: {
                checkout_title: "Checkout",
                shipping_info: "Shipping Information",
                form_name: "Full Name",
                form_phone: "Phone Number",
                form_address: "Detailed Address",
                payment_method: "Payment Method",
                pay_vodafone: "Vodafone Cash",
                pay_cod: "Cash on Delivery (COD)",
                order_summary: "Order Summary",
                item_label: "Product",
                color_label: "Color",
                size_label: "Size",
                qty_label: "Quantity",
                total_label: "Total",
                complete_btn: "Complete Order via WhatsApp",
                alert_fill: "Please fill out all required fields!",
                wa_msg_header: "New Order from A7",
                wa_msg_price: "Unit Price",
                wa_msg_payment: "Payment Method",
                pay_method_vodafone: "Vodafone Cash",
                pay_method_cod: "Cash on Delivery"
            }
        };

        const colorTranslations = {
            ar: { 'black': 'أسود', 'white': 'أبيض', 'red': 'أحمر', 'blue': 'أزرق', 'green': 'أخضر', 'yellow': 'أصفر', 'grey': 'رمادي', 'gray': 'رمادي', 'navy': 'كحلي', 'beige': 'بيج', 'brown': 'بني', 'orange': 'برتقالي', 'purple': 'بنفسجي', 'pink': 'بمبي' },
            en: { 'black': 'Black', 'white': 'White', 'red': 'Red', 'blue': 'Blue', 'green': 'Green', 'yellow': 'Yellow', 'grey': 'Grey', 'gray': 'Gray', 'navy': 'Navy', 'beige': 'Beige', 'brown': 'Brown', 'orange': 'Orange', 'purple': 'Purple', 'pink': 'Pink' }
        };

        const params = new URLSearchParams(window.location.search);
        const currentLang = params.get('lang') || 'ar';
        const itemName = params.get('item') || "";
        const itemColor = params.get('color') || "N/A";
        const itemSize = params.get('size') || "";
        const itemImg = params.get('img') || "";
        const itemQty = parseInt(params.get('qty')) || 1;
        const rawPrice = params.get('price') || "0";

        // Apply Language
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key.startsWith('[placeholder]')) {
                const actualKey = key.replace('[placeholder]', '');
                el.placeholder = translations[currentLang][actualKey] || el.placeholder;
            } else {
                el.innerText = translations[currentLang][key] || el.innerText;
            }
        });

        // Translate Color
        const translatedColor = colorTranslations[currentLang][itemColor.toLowerCase()] || itemColor;

        // Calculate Price
        let unitPrice = parseFloat(rawPrice.replace(/[^0-9.]/g, '')) || 0;
        let totalPrice = unitPrice * itemQty;
        let formattedTotal = currentLang === 'ar' ? `LE${totalPrice.toFixed(2)} جنيه` : `LE${totalPrice.toFixed(2)} EGP`;

        document.getElementById('displayItem').innerText = itemName;
        document.getElementById('displayColor').innerText = translatedColor;
        document.getElementById('displaySize').innerText = itemSize;
        document.getElementById('displayQty').innerText = itemQty;
        document.getElementById('displayPrice').innerText = formattedTotal;

        if (itemImg) {
            const summary = document.querySelector('.order-summary');
            const imgEl = document.createElement('img');
            imgEl.src = itemImg;
            imgEl.style.width = '80px';
            imgEl.style.height = '100px';
            imgEl.style.objectFit = 'cover';
            imgEl.style.borderRadius = '8px';
            imgEl.style.marginBottom = '15px';
            imgEl.style.display = 'block';
            summary.prepend(imgEl);
        }

        function finishOrder() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const addr = document.getElementById('custAddress').value.trim();
            const rawPayMethod = document.querySelector('input[name="payment"]:checked').value;
            const t = translations[currentLang];

            // Translate Payment Method
            let payMethod = rawPayMethod;
            if (rawPayMethod === "Vodafone Cash") payMethod = t.pay_method_vodafone;
            if (rawPayMethod === "Cash on Delivery") payMethod = t.pay_method_cod;
            
            if (!name || !phone || !addr) { 
                alert(t.alert_fill); 
                return; 
            }

            const msg = `${t.wa_msg_header}%0A---%0A${t.item_label}: ${itemName}%0A${t.color_label}: ${translatedColor}%0A${t.size_label}: ${itemSize}%0A${t.qty_label}: ${itemQty}%0A${t.wa_msg_price}: ${rawPrice}%0A${t.total_label}: ${formattedTotal}%0A---%0A${t.form_name}: ${name}%0A${t.form_phone}: ${phone}%0A${t.form_address}: ${addr}%0A${t.wa_msg_payment}: ${payMethod}%0A---%0Aرابط الصورة: ${itemImg}`;
            window.open(`https://wa.me/201063267221?text=${msg}`, '_blank');
        }
    </script>
</body>

</html>
